<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d1d1c">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent Calculator</title>
    <style>
        :root { --bg: #1d1d1c; --text: #ffffff; --btn-bg: #333; }
        .light-theme { --bg: #ffffff; --text: #000000; --btn-bg: #ddd; }
        
        body {
            padding: 15px; margin: 0;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            background-color: var(--bg); color: var(--text);
            font-family: sans-serif; transition: 0.3s;
            text-align: center;
        }

        input { width: 60%; padding: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 12px; font-size: 14px; cursor: pointer; background: var(--btn-bg); color: var(--text); border: 1px solid #777; border-radius: 4px; }
        
        #calendarGrid button { width: 40px; height: 40px; padding: 5px; font-size: 12px; }
        .selected-day { background-color: #4CAF50 !important; color: white; }
        .person-btn { margin: 2px; width: auto; }

        .active-person {
          background-color: #2196F3 !important;
          color: #ffffff !important;
          border-color: #0d47a1 !important;
          font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="themeButton" onclick="toggleTheme()">Toggle Light Mode</button>
    <button id="calendertoggle" onclick="toggleview()">Switch to Calendar Mode</button>

    
    <div id="calendarInput" style="display: none; margin-top: 20px;">
        <h2>Select Days for Each Person</h2>
        <div id="personSelector">
            <button class="person-btn" onclick="setCurrentPerson(1)">Gopal</button>
            <button class="person-btn" onclick="setCurrentPerson(2)">Joseph</button>
            <button class="person-btn" onclick="setCurrentPerson(3)">Montejo</button>
            <button class="person-btn" onclick="setCurrentPerson(4)">Pavin</button>
            <button class="person-btn" onclick="setCurrentPerson(5)">Neung</button>
            <button class="person-btn" onclick="setCurrentPerson(6)">Bank</button>
        </div>
        <h3 id="editingName">Editing: Person 1</h3>
        <div id="calendarGrid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 320px; margin: 10px auto;"></div>
    </div>

    
    <div id="manualinput">
        <h2>Days Stayed</h2>
        <label>Gopal (P1)</label><br><input type="number" id="P1" value="0"><br>
        <label>Joseph (P2)</label><br><input type="number" id="P2" value="0"><br>
        <label>Montejo (P3)</label><br><input type="number" id="P3" value="0"><br>
        <label>Pavin (P4)</label><br><input type="number" id="P4" value="0"><br>
        <label>Neung (P5)</label><br><input type="number" id="P5" value="0"><br>
        <label>Bank (P6)</label><br><input type="number" id="P6" value="0"><br>
    </div>

    <hr style="width:80%">

    <h2>Bills</h2>
    <label>Electrical Bill</label><br><input type="number" id="ElectricalBill"><br>
    <label>Water & Gas Bill</label><br><input type="number" id="WaterGasBill"><br>
    <p>Wifi: <b>30.46</b> | Town Council: <b>89.50</b></p>

    <button onclick="calculate()" style="width: 50%; background: #2196F3; color: white;">Calculate Total</button>

    <div id="output"></div>

<script>
let attendance = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
let activeperson = 1;
const personNames = ["", "Gopal","Joseph","Montejo","Pavin","Neung","Bank"];

function generateCalendar() {
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    for (let i = 1; i <= 31; i++) {
        const daybutton = document.createElement("button");
        daybutton.innerText = i;

        if (attendance[activeperson].includes(i)) {
            daybutton.classList.add("selected-day");
        }

        daybutton.onclick = () => {
            const index = attendance[activeperson].indexOf(i);
            if (index > -1) {
                attendance[activeperson].splice(index, 1);
            } else {
                attendance[activeperson].push(i);
            }
            generateCalendar();
            
            document.getElementById(`P${activeperson}`).value = attendance[activeperson].length;
        };
        grid.appendChild(daybutton);
    }
}

function setCurrentPerson(num) {
    activeperson = num;

    const name = personNames[num];
    document.getElementById("editingName").innerText = "Editing: " + name;

    const buttons = document.querySelectorAll(".person-btn");
    buttons.forEach((btn,index) => {
     if (index === num - 1) {
          btn.classList.add("active-person");
     } else {
          btn.classList.remove("active-person");
     }
    });
    generateCalendar();
}

function toggleview() {
    const manualDiv = document.getElementById("manualinput");
    const calendarDiv = document.getElementById("calendarInput");
    const btn = document.getElementById("calendertoggle");

    if (manualDiv.style.display === "none") {
        manualDiv.style.display = "block";
        calendarDiv.style.display = "none";
        btn.textContent = "Switch to Calendar Mode";
    } else {
        manualDiv.style.display = "none";
        calendarDiv.style.display = "block";
        btn.textContent = "Switch to Manual Entry";
    }
}

function calculate() {
    let p = [];
    for(let i=1; i<=6; i++) { p[i] = Number(document.getElementById(`P${i}`).value); }

    let Elec = Number(document.getElementById("ElectricalBill").value);
    let Water = Number(document.getElementById("WaterGasBill").value);
    const wifi = 30.46;
    const council = 89.50;
    
    let totaldays = p.reduce((a, b) => a + b, 0);
    if(totaldays === 0) return alert("Total days cannot be 0");

    let VarBill = Elec + Water;
    let FixBill = wifi + council;
    let costPerDay = VarBill / totaldays;
    let fixedPerPerson = FixBill / 6;

    let results = "";
    const names = ["", "Gopal", "Joseph", "Montejo", "Pavin", "Neung", "Bank"];
    
    for(let i=1; i<=6; i++) {
        let total = (costPerDay * p[i]) + fixedPerPerson;
        results += `<h3>${names[i]}: $${total.toFixed(2)}</h3>`;
    }
    document.getElementById("output").innerHTML = results;
}

function toggleTheme() {
    document.body.classList.toggle("light-theme");
    const btn = document.getElementById("themeButton");
    btn.textContent = document.body.classList.contains("light-theme") ? "Toggle Dark Mode" : "Toggle Light Mode";
}


generateCalendar();
setCurrentPerson(1);
</script>
</body>
</html>
